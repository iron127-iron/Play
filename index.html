<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>二元代碼雨 | 0 與 1 矩陣流光</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 避免拖曳選中文字，保持沉浸 */
        }

        body {
            background: #000000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            font-family: 'Courier New', 'Fira Code', 'Monaco', monospace;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: black;
            /* 確保canvas填滿螢幕無白邊 */
            position: fixed;
            top: 0;
            left: 0;
        }

        /* 極簡水印，繁體中文標示 */
        .info {
            position: fixed;
            bottom: 14px;
            left: 14px;
            color: #0f8f0f;
            font-family: system-ui, 'Courier New', monospace;
            font-size: 12px;
            opacity: 0.55;
            background: rgba(0, 0, 0, 0.5);
            padding: 4px 14px;
            border-radius: 30px;
            pointer-events: none;
            z-index: 100;
            backdrop-filter: blur(3px);
            letter-spacing: 1px;
            font-weight: 500;
            border-left: 2px solid #2ecc2e;
        }
        
        @media (max-width: 700px) {
            .info {
                font-size: 9px;
                bottom: 10px;
                left: 10px;
                padding: 3px 12px;
            }
        }
    </style>
</head>
<body>
    <canvas id="binaryRainCanvas"></canvas>
    <div class="info">✦ 二元代碼雨 ｜ 0 1 流 ✦</div>

    <script>
        (function() {
            // ---------- 高效能二元代碼雨核心 (純粹 0 與 1) ----------
            const canvas = document.getElementById('binaryRainCanvas');
            const ctx = canvas.getContext('2d');
            
            // ----- 字符集: 只有 0 和 1 (二元世界) -----
            const BINARY_CHARS = ['0', '1'];
            
            // ----- 視覺配置 (清晰、高幀率、流暢，開機即滿版)-----
            let fontSize = 22;            // 基礎字體大小，會根據螢幕動態適配，確保填滿視覺
            let columnWidth;              // 每個字符佔用寬度（px）
            let columns = 0;              // 總列數
            let drops = [];               // 每列雨滴頭部位置 (以「行索引」儲存，浮點數實現亞像素平滑移動)
            let columnSpeeds = [];         // 每列獨立速度係數 (高幀率下讓運動平滑)
            
            // 高幀率優化: 每幀移動距離更平滑，速度適中不模糊
            let globalBaseSpeed = 0.34;    // 每幀下落行數 (配合 60fps 產生流暢運動)
            // 拖尾長度 (經典代碼雨效果，每一列顯示連續的一段字符，從頭部向上逐漸變暗)
            const TAIL_LENGTH = 7;         // 拖尾長度適中，清晰展示0/1序列而不重疊模糊
            
            // 顏色風格: 純粹綠/黑色系，頭部高亮翠綠，尾部漸隱 (矩陣經典)
            const HEAD_COLOR = "#C3FF78";   // 亮螢光綠
            const MID_COLOR = "#2FBF2F";    // 翠綠
            const TAIL_COLOR = "#0A660A";   // 深墨綠
            
            // 背景淡出係數: 控制上一幀殘留消失速度，數值越大拖尾越短，畫面越清晰 (高幀率下推薦0.12~0.18)
            let fadeOpacity = 0.142;        // 每幀用半透明黑色覆蓋，產生拖尾殘影但快速消退，保證不糊且乾淨
            
            // 確保畫面填滿螢幕，沒有任何空白間隙
            function forceFullScreen() {
                canvas.style.width = '100%';
                canvas.style.height = '100%';
                canvas.style.position = 'fixed';
                canvas.style.top = '0';
                canvas.style.left = '0';
                const w = window.innerWidth;
                const h = window.innerHeight;
                if (canvas.width !== w || canvas.height !== h) {
                    canvas.width = w;
                    canvas.height = h;
                }
            }
            
            // ----- 重置所有列的參數 (自適應尺寸時呼叫，確保滿版無空洞)-----
            function initColumnsAndDrops() {
                if (!canvas) return;
                // 確保畫布尺寸為當前視口完整大小
                const w = canvas.width;
                const h = canvas.height;
                
                // 動態計算字體: 讓列數維持在 70~110 之間，同時保證0/1可讀性高，並填滿左右邊界
                let newFontSize = 20;
                if (w > 2000) newFontSize = 25;
                else if (w > 1400) newFontSize = 23;
                else if (w > 900) newFontSize = 21;
                else if (w > 600) newFontSize = 19;
                else newFontSize = 17;
                
                fontSize = Math.min(28, Math.max(16, newFontSize));
                // 等寬字體比例: 0.62 倍寬，精確計算列位置避免重疊，確保完全覆蓋螢幕寬度
                columnWidth = fontSize * 0.62;
                // 計算需要的列數，額外多 2~3 列確保邊緣完全覆蓋
                const newColumns = Math.floor(w / columnWidth) + 3;
                
                if (newColumns !== columns || columns === 0) {
                    columns = newColumns;
                    // 重新初始化每列的雨滴頭部位置和速度係數 (從不同起點開始，形成錯落)
                    drops = [];
                    columnSpeeds = [];
                    for (let i = 0; i < columns; i++) {
                        // 起始行位置: 隨機分佈在 -28 到 6 行之間，讓雨幕從頂部不同高度出現，開場即滿版流動
                        const initRow = -Math.random() * 34 - 2;
                        drops.push(initRow);
                        // 速度係數範圍 0.68 ~ 1.38 之間，差異適中，不會過快導致拖影模糊
                        columnSpeeds.push(0.70 + Math.random() * 0.68);
                    }
                } else {
                    // 如果列數不變，但寬度可能微調，為保證陣列長度一致且邊緣填滿
                    if (drops.length !== columns) {
                        drops = [];
                        columnSpeeds = [];
                        for (let i = 0; i < columns; i++) {
                            drops.push(-Math.random() * 28);
                            columnSpeeds.push(0.70 + Math.random() * 0.68);
                        }
                    }
                }
                // 設定畫布文字樣式
                ctx.font = `${fontSize}px 'Courier New', 'Fira Code', monospace`;
                ctx.textBaseline = "top";
                ctx.textAlign = "left";
                // 關閉陰影，讓文字清晰銳利 (高幀率需要極致繪圖效能)
                ctx.shadowBlur = 0;
            }
            
            // 尺寸自適應 + 強制滿版 (防抖優化，啟動時與調整視窗時確保填滿)
            function resizeCanvasAndReset() {
                const w = window.innerWidth;
                const h = window.innerHeight;
                canvas.width = w;
                canvas.height = h;
                // 再次確保 CSS 強制填滿 (預防任何邊距)
                canvas.style.width = '100%';
                canvas.style.height = '100%';
                canvas.style.display = 'block';
                initColumnsAndDrops();
            }
            
            // ---------- 繪製二元代碼雨 (極致流暢，只有0和1，填滿每個角落) ----------
            function drawBinaryRain() {
                if (!ctx || columns === 0) return;
                
                // 1. 用半透明黑色填充，製造拖尾但快速消退，防止視覺殘留模糊 (高幀率不卡頓)
                ctx.fillStyle = `rgba(0, 0, 0, ${fadeOpacity})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // 設定字體 (每一幀重新確保，避免遺失)
                ctx.font = `${fontSize}px 'Courier New', 'Fira Code', monospace`;
                ctx.textBaseline = "top";
                
                // 可視範圍最大行數 (確保超出邊界的雨滴正確重置)
                const maxRows = Math.ceil(canvas.height / fontSize) + 12;
                
                // 為了極致效能，預先定義二元字符
                const char0 = '0';
                const char1 = '1';
                
                // 遍歷每一列 (經典直瀑式)
                for (let col = 0; col < columns; col++) {
                    // 獲取當前列頭部位置 (浮點行數)
                    let headRow = drops[col];
                    const speedFactor = columnSpeeds[col];
                    
                    // 更新頭部下落: 全域速度 * 列獨立係數，流暢且速度差異化
                    let newRow = headRow + globalBaseSpeed * speedFactor;
                    
                    // 邊界重置: 超出畫面底部一定範圍後重置到頂部，保證無限循環且填滿螢幕不間斷
                    if (newRow > maxRows) {
                        // 重置該列：從頂部隨機負行開始 (-14 ~ -2)，讓雨重新出現，完美銜接
                        newRow = -Math.random() * 16 - 2;
                        // 同時給予一個新的速度係數，增加隨機性但不過快
                        columnSpeeds[col] = 0.70 + Math.random() * 0.70;
                    }
                    drops[col] = newRow;
                    
                    const currentHeadRow = drops[col];
                    const headRowInt = Math.floor(currentHeadRow);
                    
                    // 繪製拖尾字符 (從頭部開始向上繪製 TAIL_LENGTH 個字符，形成經典拖尾)
                    for (let step = 0; step < TAIL_LENGTH; step++) {
                        const drawRow = headRowInt - step;
                        if (drawRow < 0) continue; // 超出畫布頂部不繪製
                        const yPos = drawRow * fontSize;
                        if (yPos > canvas.height + fontSize) break; // 超出底部不繪製
                        
                        // 隨機選擇 '0' 或 '1' (純粹二元，每個位置獨立隨機提升真實感)
                        const binaryChar = (Math.random() < 0.5) ? char0 : char1;
                        
                        // 基於 step 距離頭部的距離計算顏色強度 (step=0 最亮, step越大越暗)
                        let charColor;
                        if (step === 0) {
                            // 雨滴頭部: 亮螢光綠
                            charColor = HEAD_COLOR;
                        } else {
                            // 根據拖尾比例漸層
                            const intensity = 1 - (step / TAIL_LENGTH);  // 從1向0遞減
                            if (intensity > 0.6) {
                                const gVal = Math.floor(70 + 140 * intensity);
                                charColor = `rgb(30, ${gVal}, 20)`;
                            } else if (intensity > 0.25) {
                                const gVal = Math.floor(40 + 80 * intensity);
                                charColor = `rgb(15, ${gVal}, 12)`;
                            } else {
                                charColor = TAIL_COLOR;
                            }
                            // 最末尾增加透明度漸變，避免模糊重疊，呈現乾淨消失
                            if (step >= TAIL_LENGTH - 2) {
                                const alpha = Math.max(0.3, intensity * 0.7);
                                charColor = `rgba(20, 100, 22, ${alpha})`;
                            }
                        }
                        
                        // 精確計算 x 座標 (完全對齊，填滿整排)
                        const xPos = col * columnWidth;
                        ctx.fillStyle = charColor;
                        ctx.fillText(binaryChar, xPos, yPos);
                    }
                    
                    // 額外: 在頭部附近偶爾增加高光閃爍 (極低機率，強化視覺但不增加模糊)
                    if (Math.random() < 0.018 && currentHeadRow > 0 && currentHeadRow < maxRows) {
                        ctx.fillStyle = "#E2FFA3";
                        const extraBit = (Math.random() < 0.5) ? '0' : '1';
                        const headX = col * columnWidth;
                        const headYPos = headRowInt * fontSize;
                        ctx.fillText(extraBit, headX, headYPos);
                    }
                }
                
                // 極低機率在畫面隨機位置出現高亮二元碼 (矩陣感彩蛋，不影響效能)
                if (Math.random() < 0.006) {
                    const randCol = Math.floor(Math.random() * columns);
                    if (randCol >= 0 && randCol < columns) {
                        const maxRowVisible = Math.floor(canvas.height / fontSize);
                        if (maxRowVisible > 2) {
                            const randRow = Math.floor(Math.random() * (maxRowVisible - 2)) + 1;
                            const xPos = randCol * columnWidth;
                            const yPos = randRow * fontSize;
                            ctx.fillStyle = "#B4FF66";
                            ctx.fillText((Math.random() < 0.5) ? '0' : '1', xPos, yPos);
                        }
                    }
                }
            }
            
            // ----- 動態速度微調 (使整體節奏輕微變化但不影響高幀率流暢性) -----
            function dynamicSpeedVariation() {
                // 讓全域基礎速度在 0.31 ~ 0.43 之間緩慢正弦波動，帶來呼吸感，同時保持0/1清晰流動
                const updateSpeed = () => {
                    const t = Date.now() / 14000;
                    globalBaseSpeed = 0.33 + Math.sin(t) * 0.07;
                    setTimeout(updateSpeed, 3200);
                };
                updateSpeed();
            }
            
            // 速度回歸機制: 防止滑鼠互動導致某些列速度過快，保持整體一致性 (每1.6秒溫和調整)
            function normalizeSpeedsGradually() {
                if (columnSpeeds.length) {
                    for (let i = 0; i < columnSpeeds.length; i++) {
                        // 讓極端速度回歸到合理區間 [0.68, 1.42] 之間
                        if (columnSpeeds[i] > 1.46) columnSpeeds[i] *= 0.98;
                        if (columnSpeeds[i] < 0.66) columnSpeeds[i] = 0.70;
                        // 稍微向均值靠攏，但保留差異性
                        if (columnSpeeds[i] > 1.25) columnSpeeds[i] -= 0.004;
                    }
                }
                requestAnimationFrame(() => {
                    setTimeout(normalizeSpeedsGradually, 1700);
                });
            }
            
            // ----- 滑鼠/觸控互動: 在游標位置增加流速，製造動態漣漪 (高幀率體驗順滑)-----
            let mouseTimeout = null;
            function onPointerMove(clientX) {
                if (!canvas || columns === 0) return;
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                let canvasX = (clientX - rect.left) * scaleX;
                if (canvasX < 0) canvasX = 0;
                const colIndex = Math.floor(canvasX / columnWidth);
                if (colIndex >= 0 && colIndex < columns) {
                    // 給當前列及相鄰列短暫加速 (輕快但不造成拖影)
                    if (columnSpeeds[colIndex]) {
                        columnSpeeds[colIndex] = Math.min(1.62, columnSpeeds[colIndex] + 0.26);
                    }
                    if (colIndex + 1 < columns) {
                        columnSpeeds[colIndex+1] = Math.min(1.58, columnSpeeds[colIndex+1] + 0.16);
                    }
                    if (colIndex - 1 >= 0) {
                        columnSpeeds[colIndex-1] = Math.min(1.58, columnSpeeds[colIndex-1] + 0.16);
                    }
                    
                    // 重置計時器讓速度逐漸恢復
                    if (mouseTimeout) clearTimeout(mouseTimeout);
                    mouseTimeout = setTimeout(() => {
                        for (let i = 0; i < columns; i++) {
                            if (columnSpeeds[i] > 1.38) {
                                columnSpeeds[i] = 0.82 + Math.random() * 0.58;
                            }
                        }
                    }, 420);
                }
            }
            
            function onMouseMove(e) {
                onPointerMove(e.clientX);
            }
            
            function onTouchMove(e) {
                e.preventDefault();
                if (e.touches.length) {
                    onPointerMove(e.touches[0].clientX);
                }
            }
            
            // 防抖視窗 resize (確保滿版不間斷)
            let resizeDebounce = null;
            function handleResize() {
                if (resizeDebounce) clearTimeout(resizeDebounce);
                resizeDebounce = setTimeout(() => {
                    forceFullScreen();
                    resizeCanvasAndReset();
                }, 80);
            }
            
            // 高幀率動畫循環 (無節流，全速運行，充分利用刷新率，無殘影)
            let animationFrameId = null;
            function animate() {
                drawBinaryRain();
                animationFrameId = requestAnimationFrame(animate);
            }
            
            // 啟動時確保滿版並立即覆蓋整個螢幕
            function startupFullscreen() {
                forceFullScreen();
                resizeCanvasAndReset();
                // 強制再立即執行一次確保邊緣無白邊
                setTimeout(() => {
                    forceFullScreen();
                    if (canvas.width !== window.innerWidth || canvas.height !== window.innerHeight) {
                        canvas.width = window.innerWidth;
                        canvas.height = window.innerHeight;
                        initColumnsAndDrops();
                    }
                }, 20);
            }
            
            // ---------- 啟引擎，啟動時鋪滿全螢幕 + 繁體中文環境 ----------
            function init() {
                startupFullscreen();          // 第一步立即滿版
                dynamicSpeedVariation();       // 動態速度波動，讓節奏活躍
                normalizeSpeedsGradually();    // 速度平滑管理
                
                // 註冊事件 (滑鼠 + 觸控，確保手機滿版體驗)
                window.addEventListener('resize', handleResize);
                window.addEventListener('mousemove', onMouseMove);
                window.addEventListener('touchmove', onTouchMove, { passive: false });
                window.addEventListener('touchstart', (e) => { if (e.touches.length) onTouchMove(e); });
                
                // 監聽螢幕旋轉或全螢幕變化再次觸發
                window.addEventListener('orientationchange', () => {
                    setTimeout(() => {
                        forceFullScreen();
                        resizeCanvasAndReset();
                    }, 30);
                });
                
                // 啟動高幀率動畫
                animate();
            }
            
            init();
        })();
    </script>
</body>
</html>
