<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Binary Rain | Futuristic Matrix</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    user-select:none;
}

:root{
    --bg:#020402;
    --main:#5dff7a;
    --main-soft:#30cc52;
    --glow:#caff7b;
    --deep:#0d4516;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:radial-gradient(circle at center,#071109 0%,#010201 60%,#000000 100%);
    font-family:"Fira Code","JetBrains Mono","Courier New",monospace;
}

/* 動態背景 */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at 20% 20%, rgba(80,255,120,.08), transparent 25%),
        radial-gradient(circle at 80% 70%, rgba(150,255,100,.06), transparent 30%);
    filter:blur(50px);
    animation:bgFloat 14s ease-in-out infinite alternate;
    pointer-events:none;
}

@keyframes bgFloat{
    from{
        transform:translateY(-20px) scale(1);
    }
    to{
        transform:translateY(20px) scale(1.05);
    }
}

canvas{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    display:block;
}

/* 上方光線 */
.topGlow{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:180px;
    background:linear-gradient(to bottom,
        rgba(90,255,120,.12),
        rgba(90,255,120,.04),
        transparent);
    pointer-events:none;
    z-index:2;
}

/* 資訊欄 */
.info{
    position:fixed;
    left:22px;
    bottom:22px;
    z-index:20;

    padding:10px 20px;
    border-radius:999px;

    color:#c8ffd0;
    font-size:13px;
    letter-spacing:2px;
    font-weight:600;

    background:rgba(0,0,0,.45);
    backdrop-filter:blur(14px);

    border:1px solid rgba(120,255,120,.18);

    box-shadow:
        0 0 18px rgba(70,255,120,.08),
        inset 0 0 18px rgba(70,255,120,.03);

    overflow:hidden;
}

.info::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,.08),
        transparent
    );
    transform:translateX(-120%);
    animation:shine 4.5s linear infinite;
}

@keyframes shine{
    to{
        transform:translateX(120%);
    }
}

.info span{
    color:#89ff89;
}

/* 中央標題 */
.centerTitle{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    z-index:5;
    pointer-events:none;

    text-align:center;
}

.centerTitle h1{
    font-size:clamp(40px,8vw,110px);
    font-weight:900;
    letter-spacing:12px;

    color:rgba(210,255,210,.06);

    text-shadow:
        0 0 18px rgba(100,255,100,.06),
        0 0 40px rgba(100,255,100,.05);

    animation:pulse 5s ease-in-out infinite;
}

.centerTitle p{
    margin-top:12px;
    font-size:clamp(10px,2vw,15px);
    letter-spacing:6px;
    color:rgba(180,255,180,.18);
}

@keyframes pulse{
    0%,100%{
        opacity:.55;
        transform:scale(1);
    }
    50%{
        opacity:.85;
        transform:scale(1.02);
    }
}

/* 四角裝飾 */
.corner{
    position:fixed;
    width:90px;
    height:90px;
    border-color:rgba(120,255,120,.22);
    z-index:10;
    pointer-events:none;
}

.corner.tl{
    top:20px;
    left:20px;
    border-top:2px solid;
    border-left:2px solid;
}

.corner.tr{
    top:20px;
    right:20px;
    border-top:2px solid;
    border-right:2px solid;
}

.corner.bl{
    bottom:20px;
    left:20px;
    border-bottom:2px solid;
    border-left:2px solid;
}

.corner.br{
    bottom:20px;
    right:20px;
    border-bottom:2px solid;
    border-right:2px solid;
}

@media (max-width:700px){

    .info{
        left:12px;
        bottom:12px;
        font-size:10px;
        padding:8px 14px;
        letter-spacing:1px;
    }

    .corner{
        width:50px;
        height:50px;
    }

    .centerTitle h1{
        letter-spacing:5px;
    }

    .centerTitle p{
        letter-spacing:3px;
    }
}
</style>
</head>

<body>

<div class="topGlow"></div>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="centerTitle">
    <h1>01</h1>
    <p>BINARY MATRIX SYSTEM</p>
</div>

<canvas id="binaryRainCanvas"></canvas>

<div class="info">
    ✦ <span>Binary</span> · Matrix Rain · Futuristic Flow ✦
</div>

<script>
(() => {

const canvas = document.getElementById("binaryRainCanvas");
const ctx = canvas.getContext("2d");

const chars = ["0","1"];

let fontSize = 34;
let columnWidth = 22;
let columns = 0;

let drops = [];
let speeds = [];

let frame = 0;

const tailLength = 7;

let baseSpeed = 0.23;

const charCache = new Map();

function resize(){

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const w = canvas.width;

    if(w > 2000) fontSize = 44;
    else if(w > 1400) fontSize = 40;
    else if(w > 1000) fontSize = 36;
    else if(w > 700) fontSize = 32;
    else fontSize = 28;

    columnWidth = fontSize * 0.72;

    columns = Math.floor(w / columnWidth) + 2;

    drops = [];
    speeds = [];

    for(let i=0;i<columns;i++){

        drops[i] = -Math.random() * 35;
        speeds[i] = 0.7 + Math.random() * 0.55;
    }

    ctx.font = `${fontSize}px Fira Code`;
}

resize();

function getChar(col,row){

    const key = `${col}_${row}`;

    if(frame % 5 === 0 || !charCache.has(key)){

        charCache.set(
            key,
            Math.random() > 0.5 ? "1" : "0"
        );
    }

    return charCache.get(key);
}

function draw(){

    ctx.fillStyle = "rgba(0,0,0,0.10)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.font = `${fontSize}px Fira Code`;
    ctx.textBaseline = "top";

    for(let col=0; col<columns; col++){

        drops[col] += baseSpeed * speeds[col];

        if(drops[col] * fontSize > canvas.height + 100){

            drops[col] = -Math.random() * 20;
            speeds[col] = 0.7 + Math.random() * 0.55;
        }

        const head = Math.floor(drops[col]);

        for(let i=0; i<tailLength; i++){

            const row = head - i;

            if(row < 0) continue;

            const x = col * columnWidth;
            const y = row * fontSize;

            const char = getChar(col,row);

            let alpha = 1 - (i / tailLength);

            if(i === 0){

                ctx.fillStyle = `rgba(220,255,180,1)`;

                ctx.shadowBlur = 20;
                ctx.shadowColor = "#b7ff78";

            }else{

                ctx.fillStyle = `rgba(80,255,110,${alpha * 0.8})`;

                ctx.shadowBlur = 10;
                ctx.shadowColor = "rgba(80,255,120,.4)";
            }

            ctx.fillText(char,x,y);
        }
    }

    frame++;

    requestAnimationFrame(draw);
}

draw();

/* 滑鼠互動 */
window.addEventListener("mousemove",e=>{

    const col = Math.floor(e.clientX / columnWidth);

    if(speeds[col]){

        speeds[col] += 0.08;

        if(speeds[col] > 1.5)
            speeds[col] = 1.5;
    }
});

/* 自然速度變化 */
setInterval(()=>{

    baseSpeed =
        0.20 +
        Math.sin(Date.now()/3000) * 0.03;

},1200);

window.addEventListener("resize",resize);

})();
</script>

</body>
</html>
