<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>二元代碼雨 | 0與1 · 從容間隔</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #000000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            font-family: 'Courier New', 'Fira Code', 'Monaco', monospace;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: black;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* 簡潔水印（繁體） */
        .info {
            position: fixed;
            bottom: 16px;
            left: 16px;
            color: #2a9d2a;
            font-family: system-ui, 'Courier New', monospace;
            font-size: 13px;
            opacity: 0.6;
            background: rgba(0, 0, 0, 0.55);
            padding: 5px 16px;
            border-radius: 40px;
            pointer-events: none;
            z-index: 100;
            backdrop-filter: blur(4px);
            letter-spacing: 1px;
            font-weight: 500;
            border-left: 2px solid #3eff3e;
        }
        
        @media (max-width: 700px) {
            .info {
                font-size: 10px;
                bottom: 12px;
                left: 12px;
                padding: 4px 14px;
            }
        }
    </style>
</head>
<body>
    <canvas id="binaryRainCanvas"></canvas>
    <div class="info">✦ 二元矩陣 · 0 1 流光 ✦</div>

    <script>
        (function() {
            // ---------- 核心：純粹 0 與 1，字符更大，變換間隔更長，視覺從容 ----------
            const canvas = document.getElementById('binaryRainCanvas');
            const ctx = canvas.getContext('2d');
            
            // ----- 字符集只有 0 和 1 (二元世界)-----
            const BINARY_CHARS = ['0', '1'];
            
            // ===== 調整重點：字體「更大」、變換「間隔更長」 =====
            let fontSize = 32;            // 基礎字體調大 (原本22 → 32，更醒目)
            let columnWidth;              // 每個字符佔用寬度
            let columns = 0;
            let drops = [];               // 每列雨滴頭部位置 (行索引，浮點)
            let columnSpeeds = [];         // 每列獨立速度係數
            
            // 全局下落速度調慢，配合「間隔多一點」的視覺沉穩感
            let globalBaseSpeed = 0.22;    // 再降低速度 (原本0.34 → 0.22) 每幀移動更少，變換間隔變長
            
            // 拖尾長度縮短一點，讓字符之間不會太擁擠，且每個0/1停留更久，間隔感更強
            const TAIL_LENGTH = 5;         // 拖尾長度減少至5，頭部到尾部跨度小，字符更替頻率下降，視覺更乾淨
            
            // 顏色風格: 頭部亮青綠，尾部深沉，保持高對比
            const HEAD_COLOR = "#D4FF6E";   // 柔和亮綠黃
            const MID_COLOR = "#42C642";    // 中綠
            const TAIL_COLOR = "#0F7A0F";   // 深綠
            
            // 背景淡出係數 (控制上一幀殘留速度) 調低一點讓痕跡維持稍長，增加「變換間隔拉長」的感覺
            // 數值越小，舊痕跡消退越慢，但為了清晰不糊，調整至 0.11 ~ 0.125 讓軌跡從容
            let fadeOpacity = 0.115;        // 經典值 0.142 → 0.115，痕跡保留稍久，字符切換感變慢
            
            // ----- 輔助: 強制滿版填滿螢幕 -----
            function forceFullScreen() {
                canvas.style.width = '100%';
                canvas.style.height = '100%';
                canvas.style.position = 'fixed';
                canvas.style.top = '0';
                canvas.style.left = '0';
                const w = window.innerWidth;
                const h = window.innerHeight;
                if (canvas.width !== w || canvas.height !== h) {
                    canvas.width = w;
                    canvas.height = h;
                }
            }
            
            // 初始化所有列的參數 (同時確保字體放大後列數仍能覆蓋全屏)
            function initColumnsAndDrops() {
                if (!canvas) return;
                const w = canvas.width;
                const h = canvas.height;
                
                // 動態計算字體：為了讓字體更大，我們設定最小26px，最大44px，保持氣勢
                let newFontSize = 32;
                if (w > 2000) newFontSize = 42;
                else if (w > 1400) newFontSize = 38;
                else if (w > 900) newFontSize = 34;
                else if (w > 600) newFontSize = 30;
                else newFontSize = 28;
                
                // 確保字體真的「大」
                fontSize = Math.min(48, Math.max(28, newFontSize));
                // 等寬字體比例 0.62，計算列寬
                columnWidth = fontSize * 0.64;   // 稍微加寬字符間距，讓閱讀更舒適
                // 計算列數，多出幾列確保滿版
                const newColumns = Math.floor(w / columnWidth) + 3;
                
                if (newColumns !== columns || columns === 0) {
                    columns = newColumns;
                    drops = [];
                    columnSpeeds = [];
                    for (let i = 0; i < columns; i++) {
                        // 起始位置隨機分散，讓雨滴開場錯落 (範圍擴大可增加變化)
                        const initRow = -Math.random() * 40 - 5;
                        drops.push(initRow);
                        // 速度係數範圍壓縮更平緩 (0.65 ~ 1.2)，讓整體變換間隔趨於一致緩慢
                        columnSpeeds.push(0.68 + Math.random() * 0.58);
                    }
                } else {
                    if (drops.length !== columns) {
                        drops = [];
                        columnSpeeds = [];
                        for (let i = 0; i < columns; i++) {
                            drops.push(-Math.random() * 35);
                            columnSpeeds.push(0.68 + Math.random() * 0.58);
                        }
                    }
                }
                
                // 設定畫布文字樣式，清晰無陰影
                ctx.font = `${fontSize}px 'Courier New', 'Fira Code', monospace`;
                ctx.textBaseline = "top";
                ctx.textAlign = "left";
                ctx.shadowBlur = 0;
            }
            
            // 滿版尺寸調整 (resize 時重新配置)
            function resizeCanvasAndReset() {
                const w = window.innerWidth;
                const h = window.innerHeight;
                canvas.width = w;
                canvas.height = h;
                canvas.style.width = '100%';
                canvas.style.height = '100%';
                initColumnsAndDrops();
            }
            
            // ---------- 繪製二元雨 (從容節奏，字符變換間隔更長) ----------
            // 為了讓每個位置上的 0/1 不要每幀都隨機變化（增加視覺穩定性），我們引入一個「變換延遲」策略：
            // 每個字符在其生命週期內保持固定值，直到下一次更新週期才可能改變。但傳統代碼雨為了華麗通常每幀隨機切換。
            // 為達成「變換間隔多一點」，我們採用一種簡單方法: 每個字符在每幾幀才隨機更新一次（降低更新頻率）
            // 但為了不降低整體性能且簡單實現，我們在繪製每個字符時，基於「全局計數器 + 行列哈希」決定是否變化，讓切換頻率降低。
            // 但為了保持純粹0/1體驗，也可以用幀計數取模。 下面實現一個優雅方法: 每3幀才刷新一次字符選值，提高間隔感。
            let frameCounter = 0;
            // 存儲每個位置的「當前字符」快取，讓字符不隨意變化，以提升變換間隔 (記憶體輕量，使用二維快取會太大？ 使用物件 Map)
            // 為了簡單且高效，我們可以在每一列的每個位置用偽隨機 + 幀數控制: 只有當 (frameCounter % 變換間隔 == 0) 才重新隨機。
            // 但是為了確保拖尾每個位置不晃眼，我們設定變換間隔 = 3 或 4，那麼字符會停留更久，達到「變換間隔多一點」的效果。
            const CHAR_UPDATE_INTERVAL = 4;   // 每4幀才改變一次字符的隨機值 (0變1 or 1變0)，大幅增加穩定感
            
            // 儲存每個位置的上次變換幀計數 或 簡單用全局方式：繪製時根據幀數與坐標決定是否更新字符
            // 但注意拖尾每列每個step位置眾多，為了效能，直接用幀計數 + 行列混合決定是否刷新字符，使得平均更換頻率降低
            function shouldUpdateChar(col, step, frameNum) {
                // 利用哈希使得不同位置更新時機錯開，但整體更新頻率降低為 1/CHAR_UPDATE_INTERVAL
                // 避免全部同時更新產生閃爍，用行列混合取模
                const hash = (col * 131 + step * 253) % CHAR_UPDATE_INTERVAL;
                return (frameNum % CHAR_UPDATE_INTERVAL) === hash;
            }
            
            // 簡單快速快取: 由於字符只有0/1, 每次繪製時根據條件決定是否重新取值。
            // 為了降低變換頻率且保留自然流動感，採用上述機制。
            
            function drawBinaryRain() {
                if (!ctx || columns === 0) return;
                
                // 半透明黑色填充，控制拖尾長度 (fadeOpacity 稍低，讓舊軌跡保留更久，間隔感拉長)
                ctx.fillStyle = `rgba(0, 0, 0, ${fadeOpacity})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.font = `${fontSize}px 'Courier New', 'Fira Code', monospace`;
                ctx.textBaseline = "top";
                
                const maxRows = Math.ceil(canvas.height / fontSize) + 14;
                const currentFrame = frameCounter;
                
                // 遍歷每一列繪製
                for (let col = 0; col < columns; col++) {
                    let headRow = drops[col];
                    const speedFactor = columnSpeeds[col];
                    
                    // 更新頭部下落 (更緩慢)
                    let newRow = headRow + globalBaseSpeed * speedFactor;
                    if (newRow > maxRows) {
                        // 重置該列：從頂部隨機負行開始，延續無盡感
                        newRow = -Math.random() * 20 - 4;
                        columnSpeeds[col] = 0.68 + Math.random() * 0.58;
                    }
                    drops[col] = newRow;
                    
                    const currentHeadRow = drops[col];
                    const headRowInt = Math.floor(currentHeadRow);
                    
                    // 繪製拖尾 (TAIL_LENGTH 較短，字符更大，間隔更清晰)
                    for (let step = 0; step < TAIL_LENGTH; step++) {
                        const drawRow = headRowInt - step;
                        if (drawRow < 0) continue;
                        const yPos = drawRow * fontSize;
                        if (yPos > canvas.height + fontSize) break;
                        
                        // 採用更新間隔控制字符切換頻率，讓每個位置的0/1不會每一幀都變動，增加靜態感與從容度
                        let binaryChar;
                        // 為了不讓每幀都隨機，使用幀計數器 + 位置哈希來決定是否更新字符。
                        // 但我們需要一種方法來取得「當前字符」：基於緩存或者簡單邏輯。最簡單且高效方法：
                        // 利用偽隨機函數，但根據幀計數分組更新，使同一位置字符保持多幀不變。
                        if (shouldUpdateChar(col, step, currentFrame)) {
                            // 只有當更新條件滿足時才重新生成 0 或 1 (真正的變換間隔拉長)
                            // 隨機決定新的字符 (0或1)
                            const newChar = (Math.random() < 0.5) ? '0' : '1';
                            // 沒有快取陣列的話直接在繪製時賦值，但為了保留到下幾幀，需要記憶體存儲。
                            // 為了實現「字符停留多幀」的效果，建立一個簡易的快取物件: window.charCache
                            if (!window.charCache) window.charCache = new Map();
                            const cacheKey = `${col}_${drawRow}`;
                            window.charCache.set(cacheKey, newChar);
                            binaryChar = newChar;
                        } else {
                            // 從快取中取上次字符
                            if (!window.charCache) window.charCache = new Map();
                            const cacheKey = `${col}_${drawRow}`;
                            if (window.charCache.has(cacheKey)) {
                                binaryChar = window.charCache.get(cacheKey);
                            } else {
                                // 若無則隨機初始化一個
                                const initChar = (Math.random() < 0.5) ? '0' : '1';
                                window.charCache.set(cacheKey, initChar);
                                binaryChar = initChar;
                            }
                        }
                        
                        // 顏色漸變 (頭部最亮，尾部暗)
                        let charColor;
                        if (step === 0) {
                            charColor = HEAD_COLOR;
                        } else {
                            const intensity = 1 - (step / TAIL_LENGTH);
                            if (intensity > 0.6) {
                                const gVal = Math.floor(80 + 140 * intensity);
                                charColor = `rgb(30, ${gVal}, 20)`;
                            } else if (intensity > 0.3) {
                                const gVal = Math.floor(50 + 80 * intensity);
                                charColor = `rgb(20, ${gVal}, 15)`;
                            } else {
                                charColor = TAIL_COLOR;
                            }
                            if (step >= TAIL_LENGTH - 1) {
                                const alpha = Math.max(0.35, intensity * 0.8);
                                charColor = `rgba(25, 100, 20, ${alpha})`;
                            }
                        }
                        
                        const xPos = col * columnWidth;
                        ctx.fillStyle = charColor;
                        ctx.fillText(binaryChar, xPos, yPos);
                    }
                    
                    // 頭部額外加強亮點 (極低機率)
                    if (Math.random() < 0.012 && currentHeadRow > 0 && currentHeadRow < maxRows) {
                        ctx.fillStyle = "#F0FFA0";
                        const gleamChar = (Math.random() < 0.5) ? '0' : '1';
                        const headX = col * columnWidth;
                        const headYPos = headRowInt * fontSize;
                        ctx.fillText(gleamChar, headX, headYPos);
                    }
                }
                
                // 每幀結束後遞增幀計數器
                frameCounter++;
                // 避免無限增長
                if (frameCounter > 10000) frameCounter = 0;
                
                // 定期清理快取，避免記憶體無限增加 (每個雨滴位置會變動，舊位置不再使用)
                if (frameCounter % 180 === 0 && window.charCache) {
                    // 保留最近活躍的部分，簡單清除所有太舊的 (此處簡單重置快取，避免膨脹)
                    if (window.charCache.size > columns * TAIL_LENGTH * 3) {
                        window.charCache.clear();
                    }
                }
            }
            
            // 動態速度微調 (使變換間隔雖慢但仍有一點節奏感)
            function dynamicSpeedVariation() {
                const updateSpeed = () => {
                    const t = Date.now() / 18000;
                    // 基礎速度維持在 0.20 ~ 0.30 區間，整體緩慢從容
                    globalBaseSpeed = 0.20 + Math.sin(t) * 0.06;
                    setTimeout(updateSpeed, 3800);
                };
                updateSpeed();
            }
            
            // 速度平穩回歸 (確保各列速度不會過快，維持間隔較長的體驗)
            function normalizeSpeedsGradually() {
                if (columnSpeeds.length) {
                    for (let i = 0; i < columnSpeeds.length; i++) {
                        if (columnSpeeds[i] > 1.28) columnSpeeds[i] *= 0.99;
                        if (columnSpeeds[i] < 0.64) columnSpeeds[i] = 0.70;
                        if (columnSpeeds[i] > 1.15) columnSpeeds[i] -= 0.002;
                    }
                }
                requestAnimationFrame(() => {
                    setTimeout(normalizeSpeedsGradually, 2500);
                });
            }
            
            // ----- 滑鼠/觸控互動 (輕微影響速度但不會破壞間隔感) -----
            let mouseTimeout = null;
            function onPointerMove(clientX) {
                if (!canvas || columns === 0) return;
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                let canvasX = (clientX - rect.left) * scaleX;
                if (canvasX < 0) canvasX = 0;
                const colIndex = Math.floor(canvasX / columnWidth);
                if (colIndex >= 0 && colIndex < columns) {
                    if (columnSpeeds[colIndex]) {
                        columnSpeeds[colIndex] = Math.min(1.40, columnSpeeds[colIndex] + 0.20);
                    }
                    if (colIndex + 1 < columns) {
                        columnSpeeds[colIndex+1] = Math.min(1.38, columnSpeeds[colIndex+1] + 0.12);
                    }
                    if (colIndex - 1 >= 0) {
                        columnSpeeds[colIndex-1] = Math.min(1.38, columnSpeeds[colIndex-1] + 0.12);
                    }
                    if (mouseTimeout) clearTimeout(mouseTimeout);
                    mouseTimeout = setTimeout(() => {
                        for (let i = 0; i < columns; i++) {
                            if (columnSpeeds[i] > 1.20) {
                                columnSpeeds[i] = 0.80 + Math.random() * 0.48;
                            }
                        }
                    }, 500);
                }
            }
            
            function onMouseMove(e) { onPointerMove(e.clientX); }
            function onTouchMove(e) {
                e.preventDefault();
                if (e.touches.length) onPointerMove(e.touches[0].clientX);
            }
            
            // resize 防抖 + 滿版
            let resizeDebounce = null;
            function handleResize() {
                if (resizeDebounce) clearTimeout(resizeDebounce);
                resizeDebounce = setTimeout(() => {
                    forceFullScreen();
                    resizeCanvasAndReset();
                    if (window.charCache) window.charCache.clear();
                }, 100);
            }
            
            // 動畫循環
            let animationFrameId = null;
            function animate() {
                drawBinaryRain();
                animationFrameId = requestAnimationFrame(animate);
            }
            
            // 啟動時立即鋪滿全螢幕，字體放大，間隔從容
            function startupFullscreen() {
                forceFullScreen();
                resizeCanvasAndReset();
                setTimeout(() => {
                    forceFullScreen();
                    if (canvas.width !== window.innerWidth || canvas.height !== window.innerHeight) {
                        canvas.width = window.innerWidth;
                        canvas.height = window.innerHeight;
                        initColumnsAndDrops();
                    }
                }, 20);
            }
            
            // 初始化整個應用 (繁體環境)
            function init() {
                startupFullscreen();
                dynamicSpeedVariation();
                normalizeSpeedsGradually();
                
                window.addEventListener('resize', handleResize);
                window.addEventListener('mousemove', onMouseMove);
                window.addEventListener('touchmove', onTouchMove, { passive: false });
                window.addEventListener('touchstart', (e) => { if (e.touches.length) onTouchMove(e); });
                window.addEventListener('orientationchange', () => {
                    setTimeout(() => {
                        forceFullScreen();
                        resizeCanvasAndReset();
                        if (window.charCache) window.charCache.clear();
                    }, 40);
                });
                
                animate();
            }
            
            init();
        })();
    </script>
</body>
</html>
